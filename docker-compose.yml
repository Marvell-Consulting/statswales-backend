services:
  db-dev:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statswales-backend

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6432:5432"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db-dev
      DB_PORT: 5432
      DB_NAME: statswales-backend
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      AUTH_TYPE: scram-sha-256
    depends_on:
      - db-dev

  db-test:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statswales-backend-test

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"

  blobstorage:
    image: mcr.microsoft.com/azure-storage/azurite
    # command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --debug=/tmp/debug.log
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  clamav:
    image: clamav/clamav-debian:latest
    ports:
      - '3310:3310'
    environment:
      CLAMD_CONF_MaxFileSize: 500M
      CLAMD_CONF_MaxScanSize: 500M
      CLAMD_CONF_StreamMaxLength: 500M
